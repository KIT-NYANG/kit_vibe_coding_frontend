server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # React Router 등 SPA — 없는 경로는 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
