# Cloud Run / 단독 프론트 배포용 — API는 브라우저가 VITE_API_BASE_URL(백엔드 공개 URL)로 직접 호출
# docker-compose 의 default.conf 와 달리 /api 프록시 없음

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
